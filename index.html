<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renave Sul | Gestão Cloud</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="light-theme">
    <!-- Login Overlay -->
    <div id="login-screen" class="login-overlay" style="display:none;"></div>

    <div id="sidebar-overlay" class="overlay"></div>
    
    <div class="app-wrapper" style="display:flex;">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="logo">
                    <div class="logo-icon small">RS</div>
                    <span class="logo-text small">RENAVE<span>SUL</span></span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="active" data-view="dashboard"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></li>
                    <li data-view="tasks"><i data-lucide="check-circle"></i> <span>Tarefas</span></li>
                    <li data-view="finance"><i data-lucide="dollar-sign"></i> <span>Finanças</span></li>
                    <li data-view="clients"><i data-lucide="users"></i> <span>Clientes</span></li>
                    <li data-view="registrations"><i data-lucide="file-text"></i> <span>Processos</span></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="window.App.logout()"><i data-lucide="log-out"></i> Sair</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <button id="mobile-toggle" class="btn-icon"><i data-lucide="menu"></i></button>
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Buscar no sistema...">
                </div>
                <div class="user-profile">
                    <span id="system-status" class="status-dot"></span>
                    <div class="avatar">GS</div>
                </div>
            </header>

            <div id="view-container" class="content-body">
                <!-- Views injected here -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Título</h2>
                <button class="btn-icon" onclick="window.App.hideModal()"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
